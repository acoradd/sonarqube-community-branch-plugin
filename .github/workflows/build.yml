name: build

on:
  push:
    tags:
      - '*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true
      -
        name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      -
        name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      -
        name: Build JAR
        run: ./gradlew shadowJar -x test
      -
        name: Rename JAR with version
        run: cp build/libs/sonarqube-community-branch-plugin.jar build/libs/sonarqube-community-branch-plugin.jar
      -
        name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/sonarqube-community-branch-plugin.jar
          generate_release_notes: true

  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true
      -
        name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      -
        name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest
      -
        name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
